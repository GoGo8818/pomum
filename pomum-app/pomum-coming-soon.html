  <style>
    :root {
      --cream: #fbf3e6;
      --ink: #271b12;
      --wine: #b3122f;
      --gold-deep: #d98f1e;
      --rose: #f23d74;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { min-height: 100%; }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: "Work Sans", sans-serif;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    ::selection { background: var(--rose); color: #fff; }

    .coming-soon {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      text-align: center;
    }

    .coming-soon__inner {
      max-width: 520px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .coming-soon__logo {
      width: min(320px, 78vw);
      height: auto;
    }

    .coming-soon__eyebrow {
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--wine);
      font-weight: 500;
    }

    .coming-soon__eyebrow::before {
      content: "✦ ";
      color: var(--gold-deep);
    }

    .coming-soon__title {
      font-family: "Fraunces", serif;
      font-size: clamp(32px, 6vw, 48px);
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1.1;
    }

    .coming-soon__lede {
      font-size: 17px;
      color: #5c4a38;
      max-width: 36ch;
    }
  </style>
</head>
